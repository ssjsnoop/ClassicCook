<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassicCook — Grandma's recipes, your ingredients</title>
<meta name="description" content="Classic homestyle recipes matched to what's already in your kitchen.">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F2E8;
    --warm-white: #FDFAF4;
    --ink: #1C1410;
    --brown: #5C3D2E;
    --rust: #B85C2A;
    --tan: #D4B896;
    --light-tan: #EAD9C4;
    --green: #4A6741;
    --divider: #C9B89A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--brown);
    color: var(--cream);
    text-align: center;
    padding: 2rem 1rem 1.5rem;
    border-bottom: 4px solid var(--rust);
  }

  header .logo-line {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--tan);
    margin-bottom: 0.4rem;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 700;
    color: var(--warm-white);
    line-height: 1.1;
  }

  header .tagline {
    font-size: 0.95rem;
    color: var(--tan);
    margin-top: 0.4rem;
    font-style: italic;
  }

  /* NAV TABS */
  .tab-bar {
    display: flex;
    background: var(--brown);
    border-bottom: 3px solid var(--rust);
    overflow-x: auto;
  }

  .tab-bar button {
    flex: 1;
    min-width: 100px;
    padding: 0.75rem 1rem;
    background: none;
    border: none;
    color: var(--tan);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -3px;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }

  .tab-bar button:hover { color: var(--warm-white); }
  .tab-bar button.active {
    color: var(--warm-white);
    border-bottom-color: var(--rust);
    background: rgba(255,255,255,0.05);
  }

  /* MAIN LAYOUT */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 1.5rem 1rem 4rem;
  }

  .section { display: none; }
  .section.active { display: block; }

  /* INGREDIENT MATCHER */
  .matcher-intro {
    background: var(--warm-white);
    border: 1px solid var(--divider);
    border-left: 4px solid var(--rust);
    padding: 1.2rem 1.5rem;
    margin-bottom: 1.5rem;
    border-radius: 2px;
  }

  .matcher-intro p {
    font-size: 0.95rem;
    color: var(--brown);
  }

  .ingredient-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .ingredient-chip {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--warm-white);
    border: 1px solid var(--divider);
    padding: 0.5rem 0.75rem;
    border-radius: 2px;
    cursor: pointer;
    font-size: 0.875rem;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }

  .ingredient-chip:hover { background: var(--light-tan); }

  .ingredient-chip.selected {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }

  .ingredient-chip input[type="checkbox"] { display: none; }

  .chip-check {
    width: 16px;
    height: 16px;
    border: 2px solid var(--divider);
    border-radius: 2px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
  }

  .ingredient-chip.selected .chip-check {
    background: white;
    border-color: white;
    color: var(--green);
    font-weight: bold;
  }

  .category-label {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--rust);
    border-bottom: 1px solid var(--divider);
    padding-bottom: 0.4rem;
    margin: 1.2rem 0 0.75rem;
  }

  .match-btn {
    display: block;
    width: 100%;
    padding: 1rem;
    background: var(--rust);
    color: white;
    border: none;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    cursor: pointer;
    border-radius: 2px;
    margin-bottom: 2rem;
    transition: background 0.2s;
  }

  .match-btn:hover { background: var(--brown); }

  .clear-btn {
    display: inline-block;
    padding: 0.5rem 1rem;
    background: none;
    border: 1px solid var(--divider);
    color: var(--brown);
    font-size: 0.85rem;
    cursor: pointer;
    border-radius: 2px;
    margin-bottom: 1rem;
    transition: background 0.15s;
  }

  .clear-btn:hover { background: var(--light-tan); }

  /* RESULTS */
  .results-header {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--brown);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid var(--divider);
  }

  .no-results {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--brown);
    font-style: italic;
  }

  /* RECIPE CARDS */
  .recipe-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }

  .recipe-card {
    background: var(--warm-white);
    border: 1px solid var(--divider);
    border-radius: 2px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .recipe-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(92,61,46,0.12);
  }

  .card-top {
    background: var(--brown);
    padding: 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .card-emoji { font-size: 2rem; }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--warm-white);
    line-height: 1.2;
  }

  .card-meta {
    font-size: 0.75rem;
    color: var(--tan);
    margin-top: 0.2rem;
  }

  .card-body { padding: 0.875rem 1rem; }

  .card-match {
    font-size: 0.8rem;
    color: var(--green);
    font-weight: 600;
    margin-bottom: 0.4rem;
  }

  .card-missing {
    font-size: 0.8rem;
    color: var(--rust);
    margin-bottom: 0.4rem;
  }

  .card-desc {
    font-size: 0.875rem;
    color: #5a4a3a;
    line-height: 1.5;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(28,20,16,0.7);
    z-index: 100;
    overflow-y: auto;
    padding: 1rem;
  }

  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

  .modal {
    background: var(--warm-white);
    max-width: 640px;
    width: 100%;
    margin: 2rem auto;
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }

  .modal-header {
    background: var(--brown);
    padding: 1.5rem;
    color: var(--warm-white);
  }

  .modal-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    line-height: 1.2;
  }

  .modal-header .modal-meta {
    font-size: 0.85rem;
    color: var(--tan);
    margin-top: 0.4rem;
  }

  .close-btn {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .close-btn:hover { background: rgba(255,255,255,0.3); }

  .modal-body { padding: 1.5rem; }

  .modal-section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--rust);
    margin: 1.2rem 0 0.6rem;
    border-bottom: 1px solid var(--divider);
    padding-bottom: 0.3rem;
  }

  .modal-section-title:first-child { margin-top: 0; }

  .ingredient-list {
    list-style: none;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.3rem 1rem;
  }

  .ingredient-list li {
    font-size: 0.9rem;
    padding: 0.25rem 0;
    border-bottom: 1px dotted var(--divider);
    color: var(--ink);
  }

  .ingredient-list li.have { color: var(--green); }
  .ingredient-list li.need { color: var(--rust); }

  .steps-list {
    list-style: none;
    counter-reset: steps;
  }

  .steps-list li {
    counter-increment: steps;
    display: flex;
    gap: 1rem;
    margin-bottom: 0.875rem;
    font-size: 0.9rem;
    line-height: 1.5;
  }

  .steps-list li::before {
    content: counter(steps);
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    background: var(--rust);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    margin-top: 2px;
  }

  /* BROWSE */
  .browse-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .filter-btn {
    padding: 0.4rem 1rem;
    background: var(--warm-white);
    border: 1px solid var(--divider);
    color: var(--brown);
    font-size: 0.85rem;
    cursor: pointer;
    border-radius: 20px;
    transition: background 0.15s, color 0.15s;
  }

  .filter-btn:hover { background: var(--light-tan); }
  .filter-btn.active { background: var(--rust); color: white; border-color: var(--rust); }

  .search-bar {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1px solid var(--divider);
    background: var(--warm-white);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.95rem;
    color: var(--ink);
    border-radius: 2px;
    margin-bottom: 1rem;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-bar:focus { border-color: var(--rust); }

  /* PAGE TITLE */
  .page-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--brown);
    margin-bottom: 0.25rem;
  }

  .page-sub {
    font-size: 0.9rem;
    color: #7a6a5a;
    margin-bottom: 1.5rem;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 1.5rem;
    font-size: 0.8rem;
    color: var(--brown);
    border-top: 1px solid var(--divider);
    background: var(--light-tan);
  }
</style>
</head>
<body>

<header>
  <div class="logo-line">Bailey Tech Digital Publishing</div>
  <h1>ClassicCook</h1>
  <div class="tagline">Grandma's recipes, your ingredients</div>
</header>

<div class="tab-bar">
  <button class="active" onclick="showTab('matcher')">🧅 What Can I Make?</button>
  <button onclick="showTab('browse')">📖 Browse Recipes</button>
</div>

<main>
  <!-- MATCHER TAB -->
  <div class="section active" id="tab-matcher">
    <div class="matcher-intro">
      <p>Check off what you have in your kitchen. We'll show you every recipe you can make right now.</p>
    </div>

    <button class="clear-btn" onclick="clearAll()">Clear all</button>

    <div id="ingredient-panel"></div>

    <button class="match-btn" onclick="runMatcher()">Show me what I can make →</button>

    <div id="match-results"></div>
  </div>

  <!-- BROWSE TAB -->
  <div class="section" id="tab-browse">
    <h2 class="page-title">All Recipes</h2>
    <p class="page-sub">Every classic in the collection.</p>

    <input class="search-bar" type="text" placeholder="Search recipes..." oninput="filterBrowse(this.value)" id="browse-search">

    <div class="browse-filters" id="browse-filters"></div>

    <div class="recipe-grid" id="browse-grid"></div>
  </div>
</main>

<footer>
  ClassicCook &mdash; Free tool by Bailey Tech Digital Publishing
</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-header">
      <div style="font-size:2.5rem;margin-bottom:0.5rem" id="modal-emoji"></div>
      <h2 id="modal-title"></h2>
      <div class="modal-meta" id="modal-meta"></div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

  "Spices": ["pepper","paprika","cinnamon","cumin","chili powder","cayenne","thyme","rosemary","dill","nutmeg","garlic powder","onion powder","italian seasoning","mustard powder","worcestershire","soy sauce"],
  "Canned/Packaged": ["chicken broth","beef broth","cream of mushroom soup","tomato paste","bbq sauce","mayonnaise","mustard","ketchup","salsa"]
};

// ============================================================
// STATE
// ============================================================
let selectedIngredients = new Set();
let currentRecipe = null;
let browseCategory = "All";

// ============================================================
// INIT
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  buildIngredientPanel();
  buildBrowseFilters();
  renderBrowseGrid(RECIPES);
});

function buildIngredientPanel() {
  const panel = document.getElementById('ingredient-panel');
  panel.innerHTML = '';
  for (const [cat, items] of Object.entries(INGREDIENT_CATEGORIES)) {
    const label = document.createElement('div');
    label.className = 'category-label';
    label.textContent = cat;
    panel.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'ingredient-grid';

    items.forEach(item => {
      const chip = document.createElement('div');
      chip.className = 'ingredient-chip';
      chip.dataset.ingredient = item;
      chip.innerHTML = `<div class="chip-check"></div><span>${capitalize(item)}</span>`;
      chip.onclick = () => toggleIngredient(item, chip);
      grid.appendChild(chip);
    });
    panel.appendChild(grid);
  }
}

function toggleIngredient(item, chip) {
  if (selectedIngredients.has(item)) {
    selectedIngredients.delete(item);
    chip.classList.remove('selected');
    chip.querySelector('.chip-check').textContent = '';
  } else {
    selectedIngredients.add(item);
    chip.classList.add('selected');
    chip.querySelector('.chip-check').textContent = '✓';
  }
}

function clearAll() {
  selectedIngredients.clear();
  document.querySelectorAll('.ingredient-chip.selected').forEach(chip => {
    chip.classList.remove('selected');
    chip.querySelector('.chip-check').textContent = '';
  });
  document.getElementById('match-results').innerHTML = '';
}

function runMatcher() {
  const resultsDiv = document.getElementById('match-results');

  if (selectedIngredients.size === 0) {
    resultsDiv.innerHTML = '<div class="no-results">Check off some ingredients first.</div>';
    return;
  }

  // Score recipes
  const scored = RECIPES.map(recipe => {
    const have = recipe.required.filter(r => selectedIngredients.has(r));
    const missing = recipe.required.filter(r => !selectedIngredients.has(r));
    const score = have.length / recipe.required.length;
    return { recipe, have, missing, score };
  });

  // Full matches first, then partial (at least 60%)
  const full = scored.filter(r => r.score === 1).sort((a,b) => a.recipe.name.localeCompare(b.recipe.name));
  const partial = scored.filter(r => r.score >= 0.6 && r.score < 1).sort((a,b) => b.score - a.score);

  let html = '';

  if (full.length > 0) {
    html += `<div class="results-header">✅ You can make these right now (${full.length})</div>`;
    html += '<div class="recipe-grid">';
    full.forEach(r => { html += buildCard(r.recipe, r.have, r.missing); });
    html += '</div>';
  }

  if (partial.length > 0) {
    html += `<div class="results-header" style="margin-top:2rem">🛒 Almost there — just missing a few (${partial.length})</div>`;
    html += '<div class="recipe-grid">';
    partial.forEach(r => { html += buildCard(r.recipe, r.have, r.missing); });
    html += '</div>';
  }

  if (full.length === 0 && partial.length === 0) {
    html = '<div class="no-results">No close matches yet — try adding more ingredients.</div>';
  }

  resultsDiv.innerHTML = html;
}

// ============================================================
// BROWSE
// ============================================================
function buildBrowseFilters() {
  const categories = ['All', ...new Set(RECIPES.map(r => r.category))];
  const container = document.getElementById('browse-filters');
  container.innerHTML = categories.map(cat =>
    `<button class="filter-btn ${cat === 'All' ? 'active' : ''}" onclick="setBrowseFilter('${cat}', this)">${cat}</button>`
  ).join('');
}

function setBrowseFilter(cat, btn) {
  browseCategory = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterBrowse(document.getElementById('browse-search').value);
}

function filterBrowse(query) {
  const q = query.toLowerCase();
  const filtered = RECIPES.filter(r => {
    const matchCat = browseCategory === 'All' || r.category === browseCategory;
    const matchQ = !q || r.name.toLowerCase().includes(q) || r.desc.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  renderBrowseGrid(filtered);
}

function renderBrowseGrid(recipes) {
  const grid = document.getElementById('browse-grid');
  if (recipes.length === 0) {
    grid.innerHTML = '<div class="no-results">No recipes found.</div>';
    return;
  }
  grid.innerHTML = recipes.map(r => buildCard(r, [], [])).join('');
}

// ============================================================
// CARD
// ============================================================
function buildCard(recipe, have, missing) {
  let matchLine = '';
  if (have.length > 0 && missing.length === 0) {
    matchLine = `<div class="card-match">✅ You have everything</div>`;
  } else if (have.length > 0) {
    matchLine = `<div class="card-match">✅ Have ${have.length} of ${recipe.required.length}</div>
                 <div class="card-missing">🛒 Need: ${missing.slice(0,3).map(capitalize).join(', ')}${missing.length > 3 ? '...' : ''}</div>`;
  }

  return `
    <div class="recipe-card" onclick='openModal(${recipe.id})'>
      <div class="card-top">
        <span class="card-emoji">${recipe.emoji}</span>
        <div>
          <div class="card-title">${recipe.name}</div>
          <div class="card-meta">${recipe.category} · ${recipe.time} · Serves ${recipe.serves}</div>
        </div>
      </div>
      <div class="card-body">
        ${matchLine}
        <div class="card-desc">${recipe.desc}</div>
      </div>
    </div>`;
}

// ============================================================
// MODAL
// ============================================================
function openModal(id) {
  const recipe = RECIPES.find(r => r.id === id);
  if (!recipe) return;
  currentRecipe = recipe;

  document.getElementById('modal-emoji').textContent = recipe.emoji;
  document.getElementById('modal-title').textContent = recipe.name;
  document.getElementById('modal-meta').textContent = `${recipe.category} · ${recipe.time} · Serves ${recipe.serves}`;

  // Determine which ingredients user has (if matcher was run)
  const haveSet = selectedIngredients;

  const ingHtml = recipe.ingredients.map(ing => {
    const key = recipe.required.find(r => ing.toLowerCase().includes(r));
    const cls = haveSet.size > 0 ? (key && haveSet.has(key) ? 'have' : 'need') : '';
    return `<li class="${cls}">${ing}</li>`;
  }).join('');

  const stepsHtml = recipe.steps.map(s => `<li>${s}</li>`).join('');

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-section-title">Ingredients</div>
    <ul class="ingredient-list">${ingHtml}</ul>
    <div class="modal-section-title">Instructions</div>
    <ol class="steps-list">${stepsHtml}</ol>
  `;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// ============================================================
// TABS
// ============================================================
function showTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  event.target.classList.add('active');
}

// ============================================================
// UTILS
// ============================================================
function capitalize(str) {
  return str.charAt(0).toUpperCase() + str.slice(1);
}
</script>

</html>
